<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minichat</title>
    <link rel="icon" id="favicon" href="">
    <style>
        body { opacity: 0; transition: opacity 0.3s ease; margin: 0; }
        
        #chat-body {
            font-family: var(--font-name), sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text);
        }
        #chat-container {
            width: 95%; max-width: 700px; height: 85vh;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid var(--primary-dim);
        }
        header {
            padding: 15px;
            background: var(--primary-dim);
            font-weight: bold;
            text-align: center;
            color: var(--text);
        }
        #messages {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 12px;
            background: var(--bg);
        }
        .message { padding: 12px 16px; border-radius: 18px; max-width: 85%; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .user { background: var(--primary); color: var(--bg); align-self: flex-end; }
        .ai { background: var(--surface); color: var(--text); align-self: flex-start; border: 1px solid var(--primary-dim); }
        #input-area { display: flex; padding: 15px; background: var(--surface); border-top: 1px solid var(--primary-dim); gap: 10px; }
        #user-input { flex: 1; padding: 12px; border: 1px solid var(--primary-dim); border-radius: 8px; background: var(--bg); color: var(--text); outline: none; }
        #send-btn { padding: 10px 25px; background: var(--primary); color: var(--bg); border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        footer { padding: 8px; font-size: 11px; color: var(--text-dim); text-align: center; background: var(--surface); word-break: break-all; }
    </style>
</head>
<body id="chat-body">
<div id="chat-container">
    <header id="header-name">Legu Groq Minichat</header>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
    <footer id="key-display">Initializing...</footer>
</div>

<script>
    let API_KEY = "";
    const MODEL = "llama-3.3-70b-versatile";

    async function init() {
        const res = await fetch('/settings.json');
        const cfg = await res.json();
        
        const root = document.documentElement;
        const c = cfg.chatColors;
        root.style.setProperty('--bg', c.background);
        root.style.setProperty('--surface', c.surface);
        root.style.setProperty('--primary', c.primary);
        root.style.setProperty('--primary-dim', c.primaryDim);
        root.style.setProperty('--text', c.text);
        root.style.setProperty('--text-dim', c.textDim);
        root.style.setProperty('--font-name', cfg.font.name);

        const fontStyle = document.createElement('style');
        fontStyle.appendChild(document.createTextNode(`@font-face { font-family: "${cfg.font.name}"; src: url("${cfg.font.path}") format("${cfg.font.type}"); }`));
        document.head.appendChild(fontStyle);

        document.getElementById('favicon').href = cfg.content.favicon;
        document.body.style.opacity = "1";
        
        loadApiKey();
    }

    async function loadApiKey() {
        try {
            const response = await fetch('./api.txt');
            const encodedKey = await response.text();
            API_KEY = atob(encodedKey.trim());
            document.getElementById('key-display').innerText = `Current API (public): ${API_KEY}`;
        } catch (err) { 
            document.getElementById('key-display').innerText = "Error: api.txt not found."; 
        }
    }

    function appendMessage(role, text) {
        const m = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerText = text;
        m.appendChild(div);
        m.scrollTo({ top: m.scrollHeight, behavior: 'smooth' });
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const text = input.value.trim();
        if (!text || !API_KEY) return;

        appendMessage('user', text);
        input.value = ''; input.disabled = true; btn.disabled = true;

        try {
            const response = await fetch("https://groq.com", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: MODEL, messages: [{ role: "user", content: text }] })
            });
            const data = await response.json();
            appendMessage('ai', data.choices[0].message.content);
        } catch (e) { 
            appendMessage('ai', "Error connecting to Groq."); 
        } finally { 
            input.disabled = false; btn.disabled = false; input.focus(); 
        }
    }

    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('user-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

    init();
</script>
</body>
</html>
