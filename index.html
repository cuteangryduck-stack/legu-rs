<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legu</title>
    <link rel="icon" href="https://legu.veho.com.au/legu-rs.png">
    <style>
        :root {
            --bg-color: #1a1f1a;
            --surface-color: #222822;
            --primary-green: #3fdc85;
            --dim-green: #2a7a3a;
            --text-main: #b7c8b7;
            --text-dim: #6f7a6f;
            --font-family: sans-serif;
            --button-bg: #2c332c;
            --button-hover: #3a463a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.55' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            background-blend-mode: overlay;
            opacity: 0.98;
        }

        main {
            text-align: center;
            z-index: 10;
            padding: 2rem;
        }

        .brand {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: var(--primary-green);
            margin-bottom: 0.5rem;
            text-transform: lowercase;
            filter: drop-shadow(0 0 15px rgba(63, 220, 133, 0.2));
        }

        .status {
            font-size: 1rem;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .status::after {
            content: "";
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--dim-green);
            border-radius: 50%;
            margin-left: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.3; }
        }

        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .btn {
            background-color: var(--button-bg);
            color: var(--text-main);
            padding: 0.7rem 1.4rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 1rem;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background-color: var(--button-hover);
        }

        footer {
            position: absolute;
            bottom: 2rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-align: center;
            line-height: 1.6;
        }

        .credits {
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        a {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.2s ease, border-bottom 0.2s ease;
            border-bottom: 1px solid transparent;
            padding-bottom: 2px;
        }

        a:hover {
            color: var(--primary-green);
            border-bottom: 1px solid var(--primary-green);
        }

        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(63, 220, 133, 0.07) 0%, rgba(26, 31, 26, 0) 70%);
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .brand { font-size: 3rem; }
            .status { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <main>
        <h1 class="brand">legu</h1>
        <p class="status">Site will be released later</p>

        <div class="buttons">
            <a class="btn" href="/tools/index.html">Tools</a>
            <a class="btn" href="/jugar/index.html">Games</a>
            <a class="btn" href="https://jerjugar.zya.me">JerJugar</a>
        </div>
    </main>

    <footer>
        <div class="credits">Akon'Vess</div>
        <div class="links">
            <a href="https://github.com/cuteangryduck-stack" target="_blank" rel="noopener noreferrer">Github</a>
            <a href="mailto:cute.angryduck@gmail.com">Email</a>
        </div>
    </footer>

    <script>
        document.addEventListener('mousemove', (e) => {
            const glow = document.querySelector('.glow');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            const moveX = (x - 0.5) * 50;
            const moveY = (y - 0.5) * 50;
            glow.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
        });
    </script>
</body>
</html>
